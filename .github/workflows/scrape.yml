name: Scrape Berlin cinema feed

on:
  schedule:
    - cron: "17 3 * * *"   # ~05:17 Berlin time
    - cron: "17 12 * * *"  # ~14:17 Berlin time
  workflow_dispatch:

concurrency:
  group: cinema-scrape
  cancel-in-progress: false

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      - name: Scrape & build feed
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          OMDB_API_KEY: ${{ secrets.OMDB_API_KEY }}
          REQ_GAP_MS: "400"
        run: node src/index.js

      - name: Commit warmed caches
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add cache || true
          git commit -m "chore: warm enrichment/cinema cache [skip ci]" || echo "no cache changes"
          git push || echo "push skipped"

      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - id: deploy
        uses: actions/deploy-pages@v4
